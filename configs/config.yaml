# ---------------------------------------------------------------------------
# Model settings (Phase 2+)
# ---------------------------------------------------------------------------
model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  backend: "transformers"    # "transformers" (Kaggle/Colab) | "api" (future)
  temperature: 0.01
  max_tokens: 8192
  device: "auto"
  quantize_4bit: false       # set true for GPUs with <8GB VRAM

# ---------------------------------------------------------------------------
# Few-shot settings (Phase 4B)
# ---------------------------------------------------------------------------
few_shot:
  num_examples: 5
  selection: "diverse"   # "diverse" | "random"

# ---------------------------------------------------------------------------
# CAMeL Tools settings
# ---------------------------------------------------------------------------
camel:
  enabled: true
  morphology:
    db: "calima-msa-r13"
    cache_size: 10000
  validation:
    enabled: true
    re_correct: false
    min_confidence: 0.5

# ---------------------------------------------------------------------------
# API backend settings (used when model.backend = "api") — future extension
# ---------------------------------------------------------------------------
api:
  base_url: null               # e.g., "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"  # environment variable holding the key (never hardcoded)
  timeout_s: 30
  requests_per_minute: 60

# ---------------------------------------------------------------------------
# Phase 3 specific
# ---------------------------------------------------------------------------
phase3:
  top_n: 10                    # number of top confusion pairs to inject into prompt
  format_style: "flat_arabic"  # "flat_arabic" | "grouped_arabic"
  min_substitutions: 200       # minimum substitutions for per-dataset matrix to be used
                               # (datasets below threshold fall back to pooled matrix)
  analyze_errors: true         # run error_changes.json (adds ~10% runtime)
  analyze_impact: true         # run confusion_impact.json (requires analyze_errors)
  max_retries: 2               # LLM retry count on empty or failed output

# ---------------------------------------------------------------------------
# Phase 4 specific
# ---------------------------------------------------------------------------
phase4:
  rules:
    categories: null             # null = all categories; or list e.g. ["taa_marbuta","hamza"]
    n_rules: null                # null = all rules; or integer to cap
    format_style: "compact_arabic"  # "compact_arabic" only (extensible)
    max_retries: 2
    analyze_errors: true
  few_shot:
    splits: ["train"]
    years: ["2014"]
    num_examples: 5
    selection: "diverse"         # "diverse" | "random" | "most_common"
    seed: 42
    max_length: 300
    min_length: 10
    max_words_changed: 15
    format_style: "inline_arabic"  # "inline_arabic" | "numbered_arabic"
    max_retries: 2
    analyze_errors: true
  camel_validation:
    strategy: "revert"           # "revert" = revert invalid LLM words to valid OCR words
    phase2_dir: "results/phase2" # source of corrections.jsonl for Phase 4C

# ---------------------------------------------------------------------------
# Phase 5 specific (combinations & ablation — was Phase 6)
# ---------------------------------------------------------------------------
phase5:
  pair_best: null              # Set after reviewing pair results (e.g. "pair_conf_rules")
  analyze_errors: true
  max_retries: 2
  stats:
    alpha: 0.05                # Family-wise error rate for Bonferroni correction
    n_bootstrap: 1000          # Bootstrap iterations for confidence intervals

# ---------------------------------------------------------------------------
# Phase 4D specific (self-reflective insights + word-error pairs)
# ---------------------------------------------------------------------------
phase4d:
  source_phase: "phase2"         # which phase's train predictions to analyze
  insights:
    min_fix_rate_strength: 0.6   # show as "strength" if fix_rate > this
    max_fix_rate_weakness: 0.4   # show as "weakness" if fix_rate < this
    min_intro_rate: 0.05         # show as over-correction if intro_rate > this
    min_sample_size: 10          # min baseline count to include an error type
    top_n_weaknesses: 3          # max weakness items in prompt
    top_n_overcorrections: 2     # max over-correction items in prompt
  word_pairs_n: 15               # number of word-error pairs to inject per sample
  word_pairs_strategy: "random"  # "random" | "first"
  word_pairs_seed: 42            # random seed for reproducibility
  analyze_errors: true
  max_retries: 2
  prompt_version: "p4dv3"

# ---------------------------------------------------------------------------
# Phase 7 specific (DSPy automated prompt optimization)
# ---------------------------------------------------------------------------
phase7:
  n_train: 50                    # training examples for DSPy optimization
  n_dev: 20                      # dev examples for metric during optimization
  optimizer: "BootstrapFewShot"  # "BootstrapFewShot" | "BootstrapFewShotWithRandomSearch"
  max_bootstrapped_demos: 3      # max traces bootstrapped as few-shot demos
  max_labeled_demos: 4           # max labeled examples included in prompt
  max_rounds: 1                  # BootstrapFewShot max rounds (keep low for Kaggle)
  seed: 42
  source_datasets: null          # null = use all train datasets; or list of keys
  analyze_errors: true
  max_retries: 2

# ---------------------------------------------------------------------------
# Phase 2 specific
# ---------------------------------------------------------------------------
phase2:
  prompt_version: "p2v2"       # "p2v2" = crafted base prompt (current) | "v1"/"v2" = legacy zero-shot (old runs)
  analyze_errors: true          # run error_changes.json (adds ~10% runtime)
  max_retries: 2                # LLM retry count on empty or failed output

# ---------------------------------------------------------------------------
# Phase 1 specific
# ---------------------------------------------------------------------------
phase1:
  min_confusion_count: 2      # minimum count to include in confusion matrix
  top_confusions_n: 20        # number of top confusions exported in summary
  error_examples_per_type: 5  # max examples per error type in taxonomy

# ---------------------------------------------------------------------------
# Evaluation settings
# ---------------------------------------------------------------------------
evaluation:
  strip_diacritics: true    # primary metric: strip Arabic diacritics before CER/WER
  report_both: true          # always compute & store both with/without diacritics
  exclude_runaway: false     # exclude runaway OCR samples (OCR>5x GT length) from metrics
  runaway_ratio_threshold: 5.0  # OCR/GT length ratio above which a sample is "runaway"

# ---------------------------------------------------------------------------
# Prompt crafting (LLM-assisted prompt design via scripts/craft_prompt.py)
# ---------------------------------------------------------------------------
prompt_craft:
  results_dir: "results/prompt_craft"
  crafted_prompt_path: "configs/crafted_system_prompt.txt"
  # Samples per CER stratum in the meta-prompt
  n_correct: 5               # CER = 0 (correct samples to teach conservation)
  n_easy: 5                  # CER < 0.05
  n_medium: 10               # 0.05 < CER < 0.25
  n_hard: 5                  # CER > 0.25
  seed: 42

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
output:
  results_dir: "results"
  save_corrected: true
  save_comparisons: true

# ---------------------------------------------------------------------------
# Processing limits
# ---------------------------------------------------------------------------
processing:
  limit_per_dataset: null   # set to an integer (e.g. 50) for quick testing
  batch_size: 1
