# ---------------------------------------------------------------------------
# Model settings (Phase 2+)
# ---------------------------------------------------------------------------
model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  backend: "transformers"    # "transformers" (Kaggle/Colab) | "api" (future)
  temperature: 0.01
  max_tokens: 1024
  device: "auto"
  quantize_4bit: false       # set true for GPUs with <8GB VRAM

# ---------------------------------------------------------------------------
# CAMeL Tools settings
# ---------------------------------------------------------------------------
camel:
  enabled: true
  morphology:
    db: "calima-msa-r13"
    cache_size: 10000
  validation:
    enabled: true
    re_correct: false
    min_confidence: 0.5

# ---------------------------------------------------------------------------
# API backend settings (used when model.backend = "api") — future extension
# ---------------------------------------------------------------------------
api:
  base_url: null               # e.g., "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"  # environment variable holding the key (never hardcoded)
  timeout_s: 30
  requests_per_minute: 60

# ---------------------------------------------------------------------------
# Phase 3 specific
# ---------------------------------------------------------------------------
phase3:
  top_n: 15                    # number of top confusion pairs to inject into prompt
  format_style: "flat_arabic"  # "flat_arabic" | "grouped_arabic"
  min_substitutions: 200       # minimum substitutions for per-dataset matrix to be used
                               # (datasets below threshold fall back to pooled matrix)
  use_training_failures: true  # cross-reference confusions with LLM failure data
  training_failures_path: "results/phase2-training/analysis/word_pairs_llm_failures.txt"
  word_level_examples_n: 15    # number of word-level failure examples to inject
  analyze_errors: true         # run error_changes.json (adds ~10% runtime)
  analyze_impact: true         # run confusion_impact.json (requires analyze_errors)
  max_retries: 2               # LLM retry count on empty or failed output

# ---------------------------------------------------------------------------
# Phase 4 specific (self-reflective + training artifacts)
# ---------------------------------------------------------------------------
phase4:
  training_artifacts_dir: "results/phase2-training/analysis"
  word_pairs_n: 20               # number of UNFIXED word-error pairs to inject
  overcorrection_n: 10           # number of INTRODUCED over-correction warnings
  word_pairs_strategy: "random"  # "random" | "first"
  word_pairs_seed: 42
  analyze_errors: true
  max_retries: 2
  prompt_version: "p4v2"
  few_shot:
    enabled: true
    source_phase: "phase2"       # which phase's training corrections to draw from
    n_unchanged: 3               # CER=0 examples — teach "leave correct text alone"
    n_easy: 3                    # CER < 0.05 — simple, unambiguous corrections
    n_medium: 4                  # 0.05 <= CER < 0.25 — standard corrections
    n_hard: 5                    # CER >= 0.25 — complex multi-error corrections
    seed: 42
    max_chars: 250               # skip examples longer than this (keep prompt focused)

# ---------------------------------------------------------------------------
# Phase 5 specific (CAMeL morphological validation)
# ---------------------------------------------------------------------------
phase5:
  strategy: "revert"                 # "revert" = revert invalid/overcorrected LLM words
  source_phase_dir: "results/phase2" # which phase's corrections to validate
  use_known_overcorrections: true
  overcorrections_path: "results/phase2-training/analysis/word_pairs_llm_failures.txt"

# ---------------------------------------------------------------------------
# Phase 6 specific (combinations & ablation — was Phase 5)
# ---------------------------------------------------------------------------
phase6:
  best_combo: null               # set after reviewing results (e.g. "conf_self")
  analyze_errors: true
  max_retries: 2
  stats:
    alpha: 0.05                  # Family-wise error rate for Bonferroni correction
    n_bootstrap: 1000            # Bootstrap iterations for confidence intervals

# ---------------------------------------------------------------------------
# Phase 7 specific (DSPy automated prompt optimization)
# ---------------------------------------------------------------------------
phase7:
  n_train: 50                    # training examples for DSPy optimization
  n_dev: 20                      # dev examples for metric during optimization
  optimizer: "BootstrapFewShot"  # "BootstrapFewShot" | "BootstrapFewShotWithRandomSearch"
  max_bootstrapped_demos: 3      # max traces bootstrapped as few-shot demos
  max_labeled_demos: 4           # max labeled examples included in prompt
  max_rounds: 1                  # BootstrapFewShot max rounds (keep low for Kaggle)
  seed: 42
  source_datasets: null          # null = use all train datasets; or list of keys
  analyze_errors: true
  max_retries: 2

# ---------------------------------------------------------------------------
# Phase 8 specific (RAG — retrieval-augmented correction)
# ---------------------------------------------------------------------------
phase8:
  retrieval_mode: "bm25"           # "bm25" | "dense" | "hybrid"
  alpha: 0.6                       # hybrid weight: alpha*BM25 + (1-alpha)*dense
  char_ngram_n: 3                  # character n-gram size for BM25 sentence retrieval
  word_ngram_n: 2                  # character n-gram size for BM25 word retrieval
  embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  embedding_batch_size: 64
  embedding_device: "auto"
  top_k_sentences: 3               # retrieved sentence-level examples per query
  top_k_words: 10                  # total word-level corrections returned
  top_k_candidates: 50             # BM25 candidate pool before scoring
  word_top_k_per_input_word: 3     # candidates per input word
  min_cer: 0.0                     # minimum CER to include a sample in the index (0 = keep all)
  max_text_len: 500                # skip training samples longer than this
  source_corrections: null         # null = auto-discover from results/phase2-training/
  analyze_errors: true
  max_retries: 2

# ---------------------------------------------------------------------------
# Phase 2 specific
# ---------------------------------------------------------------------------
phase2:
  prompt_version: "p2v2"       # "p2v2" = crafted base prompt | "v1"/"v2" = legacy zero-shot (old runs)
  analyze_errors: true          # run error_changes.json (adds ~10% runtime)
  max_retries: 2                # LLM retry count on empty or failed output

# ---------------------------------------------------------------------------
# Phase 1 specific
# ---------------------------------------------------------------------------
phase1:
  min_confusion_count: 2      # minimum count to include in confusion matrix
  top_confusions_n: 20        # number of top confusions exported in summary
  error_examples_per_type: 5  # max examples per error type in taxonomy

# ---------------------------------------------------------------------------
# Evaluation settings
# ---------------------------------------------------------------------------
evaluation:
  strip_diacritics: true    # primary metric: strip Arabic diacritics before CER/WER
  report_both: true          # always compute & store both with/without diacritics
  exclude_runaway: false     # exclude runaway OCR samples (OCR>5x GT length) from metrics
  runaway_ratio_threshold: 5.0  # OCR/GT length ratio above which a sample is "runaway"

# ---------------------------------------------------------------------------
# Prompt crafting (LLM-assisted prompt design via scripts/craft_prompt.py)
# ---------------------------------------------------------------------------
prompt_craft:
  results_dir: "results/prompt_craft"
  crafted_prompt_path: "configs/crafted_system_prompt.txt"
  # Samples per CER stratum in the meta-prompt
  n_correct: 5               # CER = 0 (correct samples to teach conservation)
  n_easy: 5                  # CER < 0.05
  n_medium: 10               # 0.05 < CER < 0.25
  n_hard: 5                  # CER > 0.25
  seed: 42

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
output:
  results_dir: "results"
  save_corrected: true
  save_comparisons: true

# ---------------------------------------------------------------------------
# Processing limits
# ---------------------------------------------------------------------------
processing:
  limit_per_dataset: null   # set to an integer (e.g. 50) for quick testing
  batch_size: 1
